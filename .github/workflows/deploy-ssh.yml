# Déploiement automatique vers Hostinger via SSH (comme Sortir Monde)
# Déclenché à chaque push sur master — tu n'as rien à faire.
name: Deploy to Hostinger (SSH)

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  SSH_PORT: 65002
  # Chemin distant Hostinger (modifier ici si ton chemin est différent, ex: /home/${{ secrets.FTP_USER }}/public_html)
  WEBROOT: /home/${{ secrets.FTP_USER }}/domains/stratedgepronos.fr/public_html

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Deploy public_html via rsync (avec retry)
        run: |
          MAX=3
          DELAY=30
          for i in $(seq 1 $MAX); do
            echo "=== Tentative $i/$MAX ==="
            sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              --exclude='uploads/' \
              --filter 'P includes/smtp-config.php' \
              --timeout=60 \
              -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p ${{ env.SSH_PORT }}" \
              public_html/ \
              ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:${{ env.WEBROOT }}/ \
              && break
            echo "Echec tentative $i, nouvelle tentative dans ${DELAY}s..."
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

      - name: Créer dossiers uploads si absents
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p ${{ env.SSH_PORT }} \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} \
            "mkdir -p ${{ env.WEBROOT }}/uploads/bets ${{ env.WEBROOT }}/uploads/locked ${{ env.WEBROOT }}/uploads/avatars ${{ env.WEBROOT }}/uploads/tickets"

      - name: Auto-restaurer images depuis BDD
        env:
          RESTORE_TOKEN: ${{ secrets.RESTORE_TOKEN }}
        if: env.RESTORE_TOKEN != ''
        run: |
          echo "Restauration des images manquantes depuis la BDD..."
          RESPONSE=$(curl -s --max-time 120 "https://stratedgepronos.fr/auto-restore-images.php?token=${RESTORE_TOKEN}" || echo '{"error":"curl failed"}')
          echo "Réponse: $RESPONSE"

      - name: Vérification
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -p ${{ env.SSH_PORT }} \
            ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }} "ls -la ${{ env.WEBROOT }}/index.php && ls ${{ env.WEBROOT }}/uploads/bets/ 2>/dev/null | wc -l"
